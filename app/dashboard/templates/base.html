<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Researcher{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        header { background: #1e293b; padding: 1rem 0; border-bottom: 1px solid #334155; margin-bottom: 1.5rem; }
        header .container { display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.5rem; color: #38bdf8; }
        h2 { font-size: 1.25rem; margin-bottom: 1rem; color: #94a3b8; }
        a { color: #38bdf8; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .badge-pending { background: #475569; color: #cbd5e1; }
        .badge-planning, .badge-searching, .badge-analyzing, .badge-synthesizing { background: #1d4ed8; color: #bfdbfe; }
        .badge-completed { background: #166534; color: #bbf7d0; }
        .badge-failed { background: #991b1b; color: #fecaca; }
        .badge-cancelled { background: #78350f; color: #fde68a; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 1rem; margin-bottom: 1rem; }
        .card:hover { border-color: #475569; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid #334155; }
        th { color: #94a3b8; font-weight: 500; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .btn { display: inline-block; padding: 0.5rem 1rem; background: #2563eb; color: white; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 0.875rem; }
        .btn:hover { background: #1d4ed8; }
        .btn-danger { background: #dc2626; }
        .btn-danger:hover { background: #b91c1c; }
        input[type="text"] { width: 100%; padding: 0.5rem; background: #0f172a; border: 1px solid #334155; border-radius: 0.375rem; color: #e2e8f0; font-size: 0.875rem; }
        input[type="text"]:focus { outline: none; border-color: #2563eb; }
        .events-list { max-height: 400px; overflow-y: auto; font-family: 'SF Mono', monospace; font-size: 0.8rem; }
        .event-item { padding: 0.35rem 0; border-bottom: 1px solid #1e293b; }
        .event-phase { color: #38bdf8; font-weight: 600; }
        .event-action { color: #94a3b8; }
        .event-summary { color: #cbd5e1; }
        .metric { display: inline-block; margin-right: 1rem; }
        .metric-value { font-size: 1.25rem; font-weight: 700; color: #38bdf8; }
        .metric-label { font-size: 0.75rem; color: #64748b; }
        .form-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .form-row input { flex: 1; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Researcher</h1>
            <nav><a href="/dashboard">Runs</a></nav>
        </div>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
