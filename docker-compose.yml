services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: researcher
      POSTGRES_USER: researcher
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-researcher_dev}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researcher"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  app:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
      - ./journal:/app/journal
      - ./config:/app/config:ro
    env_file:
      - .env
    environment:
      - RESEARCHER_DATABASE__URL=postgresql+asyncpg://researcher:${POSTGRES_PASSWORD:-researcher_dev}@postgres:5432/researcher
      - RESEARCHER_REDIS__URL=redis://redis:6379/0
      - RESEARCHER_LLM__HOST=http://ollama:11434
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # Legacy CLI service (backward compatibility)
  researcher:
    build: .
    depends_on:
      - ollama
    volumes:
      - ./output:/app/output
      - ./journal:/app/journal
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - LLM_API_KEY=${LLM_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    stdin_open: true
    tty: true

volumes:
  pg_data:
  redis_data:
  ollama_data:
